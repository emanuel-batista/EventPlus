services:
  postgres-db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - grife-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-db:
    image: mongo:6
    container_name: mongo-db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - grife-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-pessoas:
    build: ./api-pessoas
    container_name: api-pessoas
    restart: always
    ports:
      - "8001:8001"
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - grife-network

  api-eventos:
    build: ./api-eventos
    container_name: api-eventos
    restart: always
    ports:
      - "8002:8002"
    environment:
      MONGO_HOST: mongo-db
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
    depends_on:
      mongo-db:
        condition: service_healthy
    networks:
      - grife-network

  api-credenciamento:
    build: ./api-credenciamento
    container_name: api-credenciamento
    restart: always
    ports:
      - "8003:8003"
    environment:
      MONGO_HOST: mongo-db
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
      API_PESSOAS_URL: http://api-pessoas:8001
      API_EVENTOS_URL: http://api-eventos:8002
    depends_on:
      api-pessoas:
        condition: service_started
      api-eventos:
        condition: service_started
    networks:
      - grife-network

networks:
  grife-network:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
